<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Identificarse — Checkout — Curino</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--black:#0a0a0a;--mid:#888;--border:#e5e5e5;--bg:#f8f8f6;--white:#fff;--font:'Open Sans',system-ui,sans-serif}
html{scroll-behavior:smooth;overflow-x:hidden}
body{background:var(--white);color:var(--black);font-family:var(--font);font-weight:400;line-height:1.6;overflow-x:hidden}

/* Nav */
.ck-nav{display:flex;align-items:center;padding:0 64px;height:60px;background:var(--black)}
.ck-nav a{display:flex;align-items:center}
.ck-nav img{height:20px;width:auto;display:block;filter:brightness(0) invert(1)}

/* Layout */
.ck-outer{background:linear-gradient(to right,var(--white) 50%,var(--bg) 50%);min-height:calc(100vh - 60px)}
.ck-wrap{display:grid;grid-template-columns:1fr 1fr;width:100%;min-height:calc(100vh - 60px)}
.ck-main{padding:3rem 64px 4rem;background:var(--white);display:flex;align-items:center;justify-content:center}
.ck-side{padding:2.5rem 64px 4rem;background:var(--bg);border-left:1px solid var(--border);position:sticky;top:0;height:100vh;overflow-y:auto}

/* Auth form */
.auth-box{width:100%;max-width:380px}
.auth-title{font-size:22px;font-weight:400;text-transform:uppercase;margin-bottom:.5rem;letter-spacing:normal}
.auth-subtitle{font-size:13px;color:var(--mid);margin-bottom:2rem}
.auth-input{width:100%;padding:.7rem .75rem;font-family:var(--font);font-size:14px;border:1px solid var(--border);outline:none;background:var(--white);transition:border-color .2s;margin-bottom:.75rem}
.auth-input:focus{border-color:var(--black)}
.auth-input::placeholder{color:var(--mid)}
.auth-btn{width:100%;padding:1rem;font-family:var(--font);font-size:12px;letter-spacing:.12em;text-transform:uppercase;border:none;cursor:pointer;transition:background .2s;font-weight:400}
.auth-btn-primary{background:var(--black);color:var(--white)}
.auth-btn-primary:hover{background:#333}
.auth-btn-primary:disabled{background:var(--mid);cursor:not-allowed}
.auth-btn-social{background:var(--white);color:var(--black);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:.6rem;margin-top:.75rem}
.auth-btn-social:hover{border-color:var(--black)}
.auth-btn-social svg{width:16px;height:16px;flex-shrink:0}
.auth-divider{display:flex;align-items:center;gap:1rem;margin:1.5rem 0;color:var(--mid);font-size:11px;letter-spacing:.1em;text-transform:uppercase}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.auth-error{background:#fef2f2;color:#dc2626;padding:.75rem;font-size:13px;margin-bottom:1rem;display:none}
.auth-link{display:block;margin-top:1.5rem;font-size:13px;color:var(--mid)}
.auth-link a{color:var(--black);text-decoration:none;border-bottom:1px solid var(--black);padding-bottom:1px}
.auth-link a:hover{color:#999;border-color:#999}

/* Summary sidebar */
.sum-title{font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;margin-bottom:1.25rem}
.sum-item{display:flex;gap:1rem;padding:1rem 0;border-bottom:1px solid var(--border)}
.sum-item:last-child{border-bottom:none}
.sum-thumb{width:72px;height:72px;background:var(--white);border:1px solid var(--border);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.sum-thumb img{max-width:100%;max-height:100%;object-fit:contain}
.sum-info{flex:1;min-width:0}
.sum-name{font-size:13px;font-weight:600;margin-bottom:.2rem}
.sum-desc{font-size:12px;color:var(--mid);line-height:1.5}
.sum-price{font-size:13px;font-weight:600;white-space:nowrap;align-self:center}
.sum-line{display:flex;justify-content:space-between;font-size:13px;padding:.4rem 0}
.sum-line-label{color:var(--mid)}
.sum-divider{border:none;border-top:1px solid var(--border);margin:1rem 0}
.sum-total{display:flex;justify-content:space-between;font-size:15px;font-weight:600;padding:.25rem 0}
.sum-total-label{font-size:12px;letter-spacing:.08em;text-transform:uppercase}
.sum-tax{font-size:11px;color:var(--mid);text-align:right;margin-top:.35rem}

/* Responsive */
@media(max-width:1200px){
  .ck-nav{padding:0 16px;height:52px}
  .ck-nav img{height:18px}
  .ck-outer{background:var(--white)}
  .ck-wrap{grid-template-columns:1fr;min-height:auto}
  .ck-main{padding:2rem 16px;justify-content:flex-start}
  .ck-side{display:none}
}
</style>
</head>
<body>

<div class="ck-nav">
  <a href="/"><img src="/assets/imagenes/logo-curino.svg" alt="Curino"></a>
</div>

<div class="ck-outer">
<div class="ck-wrap">

  <!-- LEFT: AUTH -->
  <div class="ck-main">
    <div class="auth-box">
      <h1 class="auth-title">Identificarse</h1>
      <p class="auth-subtitle">Inicia sesi&oacute;n o crea una cuenta para continuar con tu pedido</p>

      <div class="auth-error" id="authError"></div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <input type="email" class="auth-input" placeholder="Email" id="email" required autocomplete="email">
        <input type="password" class="auth-input" placeholder="Contrase&ntilde;a" id="password" required autocomplete="current-password">
        <button type="submit" class="auth-btn auth-btn-primary" id="btnLogin">Iniciar sesi&oacute;n</button>
      </form>

      <div class="auth-divider">o</div>

      <button class="auth-btn auth-btn-social" onclick="loginWithGoogle()">
        <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continuar con Google
      </button>

      <button class="auth-btn auth-btn-social" onclick="loginWithApple()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
        Continuar con Apple
      </button>

      <div class="auth-link">&iquest;No tienes cuenta? <a href="/registro/?redirect=/checkout/">Crear cuenta</a></div>
    </div>
  </div>

  <!-- RIGHT: SUMMARY -->
  <div class="ck-side">
    <div class="sum-title">Resumen del pedido</div>
    <div id="summaryItems"></div>
    <hr class="sum-divider">
    <div class="sum-line"><span class="sum-line-label">Subtotal</span><span id="sumSubtotal">&euro; 0</span></div>
    <div class="sum-line"><span class="sum-line-label">Env&iacute;o</span><span>Incluido</span></div>
    <hr class="sum-divider">
    <div class="sum-total"><span class="sum-total-label">Total</span><span id="summaryTotal">&euro; 0</span></div>
    <div class="sum-tax" id="sumTax"></div>
  </div>

</div>
</div>

<script>
var _cart=JSON.parse(localStorage.getItem('curino_cart')||'[]');
var supabase=null;

function formatPrice(amount){
  var parts=parseFloat(amount).toFixed(2).split('.');
  parts[0]=parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,'.');
  return parts.join(',')+' \u20AC';
}

// Render summary
(function(){
  var container=document.getElementById('summaryItems');
  var total=0;
  _cart.forEach(function(item){
    total+=item.precio;
    var details='';
    if(item.material) details+='Material: '+item.material+'<br>';
    var dd=item.doorDetail;
    if(dd&&dd.tipo){
      var p=[dd.tipo];
      if(dd.marco) p.push(dd.marco);
      if(dd.textil) p.push(dd.textil);
      if(dd.colorRal) p.push(dd.colorRal);
      if(dd.travesano) p.push(dd.travesano);
      details+='Puertas: '+p.join(' \u00B7 ')+'<br>';
    }else if(item.puertas&&item.puertas!=='Sin puertas'){
      details+='Puertas: '+item.puertas+'<br>';
    }
    var div=document.createElement('div');div.className='sum-item';
    div.innerHTML='<div class="sum-thumb">'+(item.thumb?'<img src="'+item.thumb+'" alt="">':'')+'</div>'+
      '<div class="sum-info"><div class="sum-name">Armario '+item.ancho+'\u00D7'+item.alto+'\u00D7'+item.fondo+' cm</div>'+
      '<div class="sum-desc">'+details+'</div></div>'+
      '<div class="sum-price">'+formatPrice(item.precio)+'</div>';
    container.appendChild(div);
  });
  document.getElementById('sumSubtotal').textContent=formatPrice(total);
  document.getElementById('summaryTotal').textContent=formatPrice(total);
  var iva=total-total/1.21;
  document.getElementById('sumTax').textContent='Incluye '+formatPrice(iva)+' de IVA (21%)';
})();

// Auth
(async function(){
  try{
    var r=await fetch('/api/config',{redirect:'follow'});
    var c=await r.json();
    if(c.supabaseUrl&&c.supabaseAnonKey&&window.supabase){
      supabase=window.supabase.createClient(c.supabaseUrl,c.supabaseAnonKey);
      var s=await supabase.auth.getSession();
      if(s.data.session) window.location.href='/checkout/';
    }
  }catch(e){}
})();

async function handleLogin(e){
  e.preventDefault();
  var btn=document.getElementById('btnLogin');
  var err=document.getElementById('authError');
  err.style.display='none';
  btn.disabled=true;
  btn.textContent='Entrando...';

  var result=await supabase.auth.signInWithPassword({
    email:document.getElementById('email').value,
    password:document.getElementById('password').value
  });
  if(result.error){
    err.textContent=result.error.message;
    err.style.display='block';
    btn.disabled=false;
    btn.textContent='Iniciar sesi\u00F3n';
    return;
  }
  window.location.href='/checkout/';
}

function getCallbackUrl(){
  return window.location.origin+'/api/auth/callback?redirect=/checkout/';
}

async function loginWithGoogle(){
  if(!supabase){alert('Cargando...');return;}
  await supabase.auth.signInWithOAuth({provider:'google',options:{redirectTo:getCallbackUrl()}});
}

async function loginWithApple(){
  if(!supabase){alert('Cargando...');return;}
  await supabase.auth.signInWithOAuth({provider:'apple',options:{redirectTo:getCallbackUrl()}});
}
</script>

</body>
</html>
