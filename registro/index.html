<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crear cuenta — Curino</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--black:#0a0a0a;--mid:#888;--border:#e5e5e5;--white:#fff;--font:'Open Sans',system-ui,sans-serif}
body{font-family:var(--font);color:var(--black);background:var(--white);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
.auth-box{width:100%;max-width:380px}
.auth-logo{display:block;height:28px;margin:0 auto 2.5rem}
.auth-title{font-size:22px;font-weight:400;text-transform:uppercase;text-align:center;margin-bottom:2rem;letter-spacing:normal}
.auth-input{width:100%;padding:.75rem 0;font-family:var(--font);font-size:14px;border:none;border-bottom:1px solid var(--border);outline:none;background:transparent;margin-bottom:1rem;transition:border-color .2s}
.auth-input:focus{border-color:var(--black)}
.auth-input::placeholder{color:var(--mid)}
.auth-btn{width:100%;padding:.85rem;font-family:var(--font);font-size:12px;letter-spacing:.1em;text-transform:uppercase;border:none;cursor:pointer;transition:background .2s;margin-bottom:.75rem;font-weight:400}
.auth-btn-primary{background:var(--black);color:var(--white)}
.auth-btn-primary:hover{background:#333}
.auth-btn-primary:disabled{background:var(--mid);cursor:not-allowed}
.auth-btn-social{background:var(--white);color:var(--black);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:.6rem}
.auth-btn-social:hover{border-color:var(--black)}
.auth-btn-social svg{width:16px;height:16px;flex-shrink:0}
.auth-divider{display:flex;align-items:center;gap:1rem;margin:1.5rem 0;color:var(--mid);font-size:11px;letter-spacing:.1em;text-transform:uppercase}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.auth-link{display:block;text-align:center;margin-top:1.5rem;font-size:13px;color:var(--mid)}
.auth-link a{color:var(--black);text-decoration:none;border-bottom:1px solid var(--black);padding-bottom:1px}
.auth-link a:hover{color:#999;border-color:#999}
.auth-error{background:#fef2f2;color:#dc2626;padding:.75rem;font-size:13px;margin-bottom:1rem;display:none}
.auth-success{background:#f0fdf4;color:#16a34a;padding:.75rem;font-size:13px;margin-bottom:1rem;display:none}
</style>
</head>
<body>

<div class="auth-box">
  <a href="/"><img src="/assets/imagenes/logo-curino.svg" alt="Curino" class="auth-logo"></a>
  <h1 class="auth-title">Crear cuenta</h1>

  <div class="auth-error" id="authError"></div>
  <div class="auth-success" id="authSuccess"></div>

  <form id="registerForm" onsubmit="handleRegister(event)">
    <input type="text" class="auth-input" placeholder="Nombre completo" id="fullname" required autocomplete="name">
    <input type="email" class="auth-input" placeholder="Email" id="email" required autocomplete="email">
    <input type="password" class="auth-input" placeholder="Contraseña (mín. 6 caracteres)" id="password" required minlength="6" autocomplete="new-password">
    <button type="submit" class="auth-btn auth-btn-primary" id="btnRegister">Crear cuenta</button>
  </form>

  <div class="auth-divider">o</div>

  <button class="auth-btn auth-btn-social" onclick="registerWithGoogle()">
    <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    Continuar con Google
  </button>

  <button class="auth-btn auth-btn-social" onclick="registerWithApple()">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
    Continuar con Apple
  </button>

  <div class="auth-link">¿Ya tienes cuenta? <a href="/login/">Iniciar sesión</a></div>
</div>

<script>
var supabase;
(async function(){
  var r = await fetch('/api/config');
  var c = await r.json();
  supabase = window.supabase.createClient(c.supabaseUrl, c.supabaseAnonKey);
  var s = await supabase.auth.getSession();
  if(s.data.session) window.location.href = '/configurador-armarios-vestidores/';
})();

async function handleRegister(e){
  e.preventDefault();
  var btn = document.getElementById('btnRegister');
  var err = document.getElementById('authError');
  var suc = document.getElementById('authSuccess');
  err.style.display = 'none';
  suc.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Creando cuenta...';

  var fullname = document.getElementById('fullname').value;
  var email = document.getElementById('email').value;
  var password = document.getElementById('password').value;

  var result = await supabase.auth.signUp({
    email,
    password,
    options: {data: {full_name: fullname}}
  });

  if(result.error){
    err.textContent = result.error.message;
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Crear cuenta';
    return;
  }

  if(result.data.user && !result.data.session){
    suc.textContent = 'Cuenta creada. Revisa tu email para confirmar.';
    suc.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Crear cuenta';
  } else {
    window.location.href = '/configurador-armarios-vestidores/';
  }
}

async function registerWithGoogle(){
  await supabase.auth.signInWithOAuth({
    provider: 'google',
    options: {redirectTo: window.location.origin + '/api/auth/callback'}
  });
}

async function registerWithApple(){
  await supabase.auth.signInWithOAuth({
    provider: 'apple',
    options: {redirectTo: window.location.origin + '/api/auth/callback'}
  });
}

// Session check moved to init above
</script>

</body>
</html>
